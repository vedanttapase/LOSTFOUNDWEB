<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LostFind - Premium Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700;800&display=swap');

        :root {
            --primary: #1a1a1e;
            --accent: #e91e63;
            --accent-light: #ff4081;
            --text-light: #f5f5f5;
            --text-muted: #b0b0b0;
            --border: rgba(255, 255, 255, 0.1);
            --glow: 0 0 20px rgba(233, 30, 99, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0f1419;
            color: var(--text-light);
            line-height: 1.6;
        }

        /* --- HEADER --- */
        header {
            background: rgba(26, 26, 30, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        nav { display: flex; gap: 1rem; align-items: center; }

        .nav-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: var(--glow);
        }

        /* --- SECTIONS --- */
        section { display: none; padding: 4rem 5%; min-height: 100vh; }
        section.active { display: block; }

        /* --- GRID --- */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .item-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .item-card:hover { border-color: var(--accent); transform: translateY(-5px); }

        .item-image {
            height: 200px;
            background-size: cover;
            background-position: center;
            background-color: #222;
        }

        .item-content { padding: 1.5rem; }

        /* --- MODAL (POP UP) --- */
        .modal { 
            display: none; /* Changed via JS */
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 9999; 
            justify-content: center; 
            align-items: center; 
            backdrop-filter: blur(10px);
        }

        .modal-content { 
            background: #1a1a1e; 
            padding: 2.5rem; 
            border-radius: 20px; 
            max-width: 500px; 
            width: 90%; 
            position: relative; 
            border: 1px solid var(--border);
            box-shadow: var(--glow);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            color: var(--accent);
            cursor: pointer;
        }

        .contact-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
            margin: 1.5rem 0;
        }

        .btn-close {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="logo" onclick="showSection('hero')">LostFind</div>
            <nav>
                <button class="nav-btn active" onclick="showSection('hero')">Home</button>
                <button class="nav-btn" onclick="showSection('browse')">Browse</button>
                <button class="nav-btn" onclick="showSection('report')">Report</button>
            </nav>
        </div>
    </header>

    <section id="hero" class="active">
        <div style="text-align: center; margin-top: 15vh;">
            <h1 style="font-family: 'Playfair Display'; font-size: 3.5rem;">Find What You've Lost</h1>
            <p style="color: var(--text-muted);">Secure community portal for lost items.</p>
            <button class="nav-btn active" style="margin-top: 20px;" onclick="showSection('browse')">Start Browsing</button>
        </div>
    </section>

    <section id="browse">
        <h2 style="text-align:center; margin-bottom: 40px;">Recent Reports</h2>
        <div id="itemsContainer" class="items-grid">
            <p style="text-align: center; grid-column: 1/-1;">Loading items from server...</p>
        </div>
    </section>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalBody">
                </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://lostfoundweb.onrender.com/api';
        let allItems = [];

        // 1. Fetch Items on load
        window.onload = loadItems;

        async function loadItems() {
            try {
                const res = await fetch(`${API_URL}/items`);
                allItems = await res.json();
                renderItems(allItems);
            } catch (err) {
                document.getElementById('itemsContainer').innerHTML = "Failed to connect to server.";
            }
        }

        function renderItems(items) {
            const container = document.getElementById('itemsContainer');
            if (items.length === 0) {
                container.innerHTML = "No items found.";
                return;
            }

            container.innerHTML = items.map(item => `
                <div class="item-card" onclick="openModal('${item._id || item.id}')">
                    <div class="item-image" style="background-image: url('${item.photo || 'https://via.placeholder.com/300'}')"></div>
                    <div class="item-content">
                        <small style="color:var(--accent)">${item.type}</small>
                        <h3>${item.name}</h3>
                        <p style="font-size:0.8rem; color:var(--text-muted)">📍 ${item.location}</p>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            // Find the item in our global array
            const item = allItems.find(i => (i._id === id || i.id === id));
            
            if (!item) {
                alert("Item details not found.");
                return;
            }

            const modalBody = document.getElementById('modalBody');
            
            // Build the Modal content (including contact info)
            modalBody.innerHTML = `
                ${item.photo ? `<img src="${item.photo}" style="width:100%; border-radius:10px; margin-bottom:15px;">` : ''}
                <h2 style="color:var(--accent); font-family:'Playfair Display'">${item.name}</h2>
                <p style="margin: 10px 0; color:#ccc;">${item.description || 'No description provided.'}</p>
                
                <div class="contact-box">
                    <p><strong>📍 Location:</strong> ${item.location}</p>
                    <p><strong>👤 Found By:</strong> ${item.contact_name || 'Anonymous'}</p>
                    <p><strong>📞 Contact:</strong> <a href="tel:${item.contact_phone}" style="color:var(--accent-light); text-decoration:none;">${item.contact_phone || 'Not provided'}</a></p>
                </div>
                
                <button class="btn-close" onclick="closeModal()">Return to Gallery</button>
            `;

            // Display the modal
            document.getElementById('detailModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Update nav buttons
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            if (id === 'browse') loadItems();
        }

        // Close modal if clicking outside the box
        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target == modal) closeModal();
        }
    </script>
</body>
</html>
