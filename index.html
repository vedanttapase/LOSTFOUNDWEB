<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LostFind | Premium Campus Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700;800&display=swap');

        :root {
            --bg-dark: #0f1419;
            --card-bg: #1a1a1e;
            --accent: #e91e63;
            --accent-glow: rgba(233, 30, 99, 0.4);
            --text-main: #f5f5f5;
            --text-dim: #b0b0b0;
            --border: rgba(255, 255, 255, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- PROFESSIONAL HEADER --- */
        header {
            background: rgba(15, 20, 25, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(to right, #ff4081, #e91e63);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            cursor: pointer;
        }

        nav { display: flex; gap: 1rem; align-items: center; }

        .nav-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-dim);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-btn:hover { color: var(--text-main); border-color: var(--border); }
        .nav-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 4px 15px var(--accent-glow); }

        /* --- SECTIONS --- */
        section { display: none; padding: 4rem 5%; min-height: calc(100vh - 80px); max-width: 1300px; margin: 0 auto; }
        section.active { display: block; animation: slideUp 0.5s ease forwards; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- BROWSE GRID --- */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .item-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: var(--transition);
            cursor: pointer;
        }

        .item-card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .item-img { height: 220px; background-size: cover; background-position: center; background-color: #222; }
        .item-info { padding: 1.5rem; }
        .item-info h3 { font-family: 'Playfair Display'; font-size: 1.4rem; margin-bottom: 0.5rem; }
        .item-tag { color: var(--accent); font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }

        /* --- FORMS --- */
        .glass-panel {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid var(--border);
            max-width: 500px;
            margin: 0 auto;
        }

        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.6rem; font-size: 0.85rem; color: var(--text-dim); }
        input, select, textarea {
            width: 100%; padding: 1rem; background: #000; border: 1px solid var(--border); border-radius: 12px; color: white; transition: var(--transition);
        }
        input:focus { border-color: var(--accent); outline: none; }

        /* --- MODAL --- */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; 
            backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content { 
            background: var(--card-bg); padding: 2.5rem; border-radius: 24px; width: 100%; max-width: 600px; 
            position: relative; border: 1px solid var(--border); 
        }

        .btn-main { background: var(--accent); color: white; border: none; padding: 1rem 2rem; border-radius: 50px; font-weight: 700; cursor: pointer; width: 100%; transition: var(--transition); }
        .btn-main:hover { transform: scale(1.02); box-shadow: 0 5px 20px var(--accent-glow); }

        .loading-spinner { text-align: center; padding: 50px; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="logo" onclick="showSection('hero')">LostFind</div>
            <nav id="mainNav">
                <span id="userNameDisplay" style="color:var(--accent); font-size: 0.8rem; font-weight:bold;"></span>
                <button class="nav-btn active" data-section="hero" onclick="showSection('hero')">Home</button>
                <button class="nav-btn" data-section="browse" onclick="showSection('browse')">Browse</button>
                <button class="nav-btn" data-section="report" onclick="handleReportNavigation()">Report</button>
                <button class="nav-btn" id="authBtn" onclick="showSection('auth')">Login</button>
            </nav>
        </div>
    </header>

    <section id="hero" class="active">
        <div style="text-align:center; padding-top: 10vh;">
            <h1 style="font-family:'Playfair Display'; font-size: 4rem; line-height: 1;">Reclaim What's <br><span style="color:var(--accent)">Yours.</span></h1>
            <p style="color:var(--text-dim); max-width: 600px; margin: 2rem auto;">Secure, fast, and exclusive to our campus. Browse hundreds of found items or report one you've discovered.</p>
            <button class="btn-main" style="max-width:250px" onclick="showSection('browse')">Browse Gallery</button>
        </div>
    </section>

    <section id="browse">
        <h2 style="font-family:'Playfair Display'; font-size: 2.5rem; margin-bottom: 2rem;">Latest Discoveries</h2>
        <div id="itemsContainer" class="items-grid">
            <div class="loading-spinner">Waking up server...</div>
        </div>
    </section>

    <section id="auth">
        <div class="glass-panel">
            <h2 id="authTitle" style="margin-bottom: 2rem;">Secure Access</h2>
            <form id="authForm">
                <div class="input-group" id="regNameGroup" style="display:none;">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="Enter full name">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="authEmail" required placeholder="name@college.edu">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="authPass" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-main">Proceed</button>
                <p onclick="toggleAuthMode()" style="text-align:center; margin-top:1.5rem; cursor:pointer; color:var(--accent); font-size:0.8rem;">Switch between Login / Sign Up</p>
            </form>
        </div>
    </section>

    <section id="report">
        <div class="glass-panel">
            <h2 style="margin-bottom: 2rem;">Report Found Item</h2>
            <form id="reportForm">
                <div class="input-group"><label>Item Name</label><input type="text" id="repName" required></div>
                <div class="input-group">
                    <label>Category</label>
                    <select id="repType">
                        <option>Electronics</option><option>Wallet/ID</option><option>Keys</option><option>Books</option>
                    </select>
                </div>
                <div class="input-group"><label>Location Found</label><input type="text" id="repLoc" required></div>
                <div class="input-group"><label>Your Contact Number</label><input type="tel" id="repPhone" required></div>
                <div class="input-group"><label>Item Photo</label><input type="file" id="repPhoto" accept="image/*"></div>
                <button type="submit" class="btn-main">Publish Report</button>
            </form>
        </div>
    </section>

    <div id="itemModal" class="modal">
        <div class="modal-content">
            <span onclick="closeModal()" style="position:absolute; right:20px; top:15px; cursor:pointer; font-size:2rem; color:var(--accent);">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://lostfoundweb.onrender.com/api';
        let currentUser = JSON.parse(localStorage.getItem('user')) || null;
        let allItems = [];
        let isLogin = true;

        window.onload = () => {
            initApp();
            loadItems();
        };

        function initApp() {
            if(currentUser) {
                document.getElementById('userNameDisplay').innerText = `WELCOME, ${currentUser.userName.toUpperCase()}`;
                const authBtn = document.getElementById('authBtn');
                authBtn.innerText = "Logout";
                authBtn.onclick = () => { localStorage.removeItem('user'); location.reload(); };
            }
        }

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(id).classList.add('active');
            const targetNav = document.querySelector(`[data-section="${id}"]`);
            if(targetNav) targetNav.classList.add('active');
            
            if(id === 'browse') loadItems();
            window.scrollTo(0,0);
        }

        function handleReportNavigation() {
            if(!currentUser) { alert("You must be logged in to report items."); showSection('auth'); }
            else { showSection('report'); }
        }

        function toggleAuthMode() {
            isLogin = !isLogin;
            document.getElementById('authTitle').innerText = isLogin ? "Secure Access" : "Create Account";
            document.getElementById('regNameGroup').style.display = isLogin ? "none" : "block";
        }

        async function loadItems() {
            const container = document.getElementById('itemsContainer');
            try {
                const res = await fetch(`${API_URL}/items`);
                allItems = await res.json();
                
                if(allItems.length === 0) {
                    container.innerHTML = "<p>No lost items reported recently.</p>";
                    return;
                }

                container.innerHTML = allItems.map(item => `
                    <div class="item-card" onclick="openModal('${item._id || item.id}')">
                        <div class="item-img" style="background-image: url('${item.photo || ''}')"></div>
                        <div class="item-info">
                            <span class="item-tag">${item.type}</span>
                            <h3>${item.name}</h3>
                            <p style="color:var(--text-dim); font-size:0.85rem;">📍 Found at ${item.location}</p>
                        </div>
                    </div>
                `).join('');
            } catch (err) { container.innerHTML = "<p>Error connecting to Render server.</p>"; }
        }

        function openModal(id) {
            const item = allItems.find(i => (i._id === id || i.id === id));
            if(!item) return;

            document.getElementById('modalBody').innerHTML = `
                <div style="text-align:center;">
                    ${item.photo ? `<img src="${item.photo}" style="width:100%; border-radius:15px; margin-bottom:1.5rem; max-height:300px; object-fit:cover;">` : ''}
                    <h2 style="font-family:'Playfair Display'; color:var(--accent); font-size:2rem;">${item.name}</h2>
                    <p style="margin:1rem 0; color:var(--text-dim);">Found at: <b>${item.location}</b></p>
                    <div style="background:rgba(255,255,255,0.03); padding:1.5rem; border-radius:15px; margin:1.5rem 0; border:1px solid var(--border);">
                        <p style="font-size:1.1rem;">📞 Contact: <a href="tel:${item.contact_phone}" style="color:var(--accent); text-decoration:none;">${item.contact_phone}</a></p>
                        <p style="font-size:0.9rem; margin-top:5px; opacity:0.7;">Reporter: ${item.contact_name}</p>
                    </div>
                    <button class="btn-main" onclick="closeModal()">Back to Feed</button>
                </div>
            `;
            document.getElementById('itemModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('itemModal').style.display = 'none'; }

        // --- AUTH API ---
        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const endpoint = isLogin ? '/login' : '/register';
            const payload = {
                email: document.getElementById('authEmail').value,
                password: document.getElementById('authPass').value,
                name: document.getElementById('regName').value
            };

            try {
                const res = await fetch(API_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if(res.ok) {
                    if(isLogin) { localStorage.setItem('user', JSON.stringify(data)); location.reload(); }
                    else { alert("Account created! Please Login."); toggleAuthMode(); }
                } else { alert(data.error || "Access Denied"); }
            } catch (err) { alert("Server is offline."); }
        };

        // --- REPORT API ---
        document.getElementById('reportForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('repName').value);
            formData.append('type', document.getElementById('repType').value);
            formData.append('location', document.getElementById('repLoc').value);
            formData.append('contact_phone', document.getElementById('repPhone').value);
            formData.append('contact_name', currentUser.userName);

            const fileInput = document.getElementById('repPhoto');
            if(fileInput.files[0]) formData.append('photo', fileInput.files[0]);

            try {
                const res = await fetch(`${API_URL}/items`, {
                    method: 'POST',
                    headers: { 'Authorization': currentUser.token }, // REQUIRED for Render security
                    body: formData
                });
                if(res.ok) { alert("Report Published!"); showSection('browse'); }
                else { alert("Session expired. Please relogin."); }
            } catch (err) { alert("Upload failed."); }
        };
    </script>
</body>
</html>
