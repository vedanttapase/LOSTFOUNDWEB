<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LostFind | Premium Campus Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700;800&display=swap');

        :root {
            --bg-dark: #0f1419;
            --card-bg: #1a1a1e;
            --accent: #e91e63;
            --text-main: #f5f5f5;
            --text-dim: #b0b0b0;
            --border: rgba(255, 255, 255, 0.08);
            --glow: 0 0 20px rgba(233, 30, 99, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-dark); color: var(--text-main); line-height: 1.6; }

        /* --- HEADER --- */
        header {
            background: rgba(15, 20, 25, 0.9); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); padding: 1rem 5%;
            position: sticky; top: 0; z-index: 1000;
        }
        .header-content { max-width: 1300px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 800; color: var(--accent); cursor: pointer; }
        
        nav { display: flex; gap: 1rem; align-items: center; }
        .nav-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 0.5rem 1.2rem; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: var(--glow); }

        /* --- SECTIONS --- */
        section { display: none; padding: 4rem 5%; max-width: 1300px; margin: 0 auto; min-height: 100vh; }
        section.active { display: block; animation: fadeIn 0.4s ease; }

        /* --- BROWSE GRID --- */
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .item-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; cursor: pointer; }
        .item-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .item-img { height: 200px; background-size: cover; background-position: center; background-color: #222; }
        .item-info { padding: 1.5rem; }

        /* --- FORMS --- */
        .glass-panel { background: var(--card-bg); padding: 2.5rem; border-radius: 20px; border: 1px solid var(--border); max-width: 450px; margin: 0 auto; }
        .input-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.8rem; color: var(--text-dim); }
        input, select, textarea { width: 100%; padding: 0.8rem; background: #000; border: 1px solid var(--border); border-radius: 10px; color: white; }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; backdrop-filter: blur(8px); align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); padding: 2.5rem; border-radius: 24px; width: 90%; max-width: 500px; border: 1px solid var(--border); }

        .btn-main { background: var(--accent); color: white; border: none; padding: 1rem; border-radius: 50px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="logo" onclick="showSection('hero')">LostFind</div>
            <nav>
                <span id="userGreet" style="color:var(--accent); font-size:0.8rem; font-weight:bold; margin-right:10px;"></span>
                <button class="nav-btn active" id="nav-hero" onclick="showSection('hero')">Home</button>
                <button class="nav-btn" id="nav-browse" onclick="showSection('browse')">Browse</button>
                <button class="nav-btn" id="nav-report" onclick="checkAuthAndReport()">Report</button>
                <button class="nav-btn" id="authBtn" onclick="showSection('auth')">Login</button>
            </nav>
        </div>
    </header>

    <section id="hero" class="active">
        <div style="text-align:center; padding-top: 15vh;">
            <h1 style="font-family:'Playfair Display'; font-size: 3.5rem;">Lost it? <span style="color:var(--accent)">Find it.</span></h1>
            <p style="color:var(--text-dim); margin: 20px 0;">The exclusive campus portal for misplaced items.</p>
            <button class="btn-main" style="max-width: 200px;" onclick="showSection('browse')">View Items</button>
        </div>
    </section>

    <section id="browse">
        <h2 style="margin-bottom: 2rem;">Recent Items</h2>
        <div id="itemsContainer" class="items-grid">
            <p id="statusMsg">Loading items from server...</p>
        </div>
    </section>

    <section id="auth">
        <div class="glass-panel">
            <h2 id="authTitle" style="margin-bottom: 1.5rem;">Access Portal</h2>
            <form id="authForm">
                <div class="input-group" id="regField" style="display:none;">
                    <label>Full Name</label>
                    <input type="text" id="regName">
                </div>
                <div class="input-group"><label>Email</label><input type="email" id="authEmail" required></div>
                <div class="input-group"><label>Password</label><input type="password" id="authPass" required></div>
                <button type="submit" class="btn-main">Continue</button>
                <p onclick="toggleAuth()" style="text-align:center; cursor:pointer; color:var(--accent); margin-top:1rem; font-size:0.8rem;">Signup / Login Toggle</p>
            </form>
        </div>
    </section>

    <section id="report">
        <div class="glass-panel">
            <h2>Report Finding</h2>
            <form id="reportForm">
                <div class="input-group"><label>Item Name</label><input type="text" id="rName" required></div>
                <div class="input-group"><label>Location</label><input type="text" id="rLoc" required></div>
                <div class="input-group"><label>Phone</label><input type="tel" id="rPhone" required></div>
                <div class="input-group"><label>Category</label>
                    <select id="rType"><option>Electronics</option><option>Personal</option><option>Documents</option></select>
                </div>
                <div class="input-group"><label>Photo</label><input type="file" id="rPhoto" accept="image/*"></div>
                <button type="submit" class="btn-main">Post Item</button>
            </form>
        </div>
    </section>

    <div id="itemModal" class="modal">
        <div class="modal-content">
            <span onclick="closeModal()" style="position:absolute; right:20px; top:15px; cursor:pointer; font-size:2rem; color:var(--accent);">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://lostfoundweb.onrender.com/api';
        let currentUser = JSON.parse(localStorage.getItem('user'));
        let allItems = [];
        let isLogin = true;

        window.onload = () => {
            updateAuthUI();
            loadItems();
        };

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const nav = document.getElementById('nav-' + id);
            if(nav) nav.classList.add('active');
            if(id === 'browse') loadItems();
        }

        function checkAuthAndReport() {
            if(!currentUser) { alert("Login required!"); showSection('auth'); }
            else { showSection('report'); }
        }

        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById('authTitle').innerText = isLogin ? "Access Portal" : "Join Portal";
            document.getElementById('regField').style.display = isLogin ? "none" : "block";
        }

        async function loadItems() {
            const container = document.getElementById('itemsContainer');
            const status = document.getElementById('statusMsg');
            try {
                const res = await fetch(`${API_URL}/items`);
                if(!res.ok) throw new Error("Server Error");
                allItems = await res.json();
                
                if(allItems.length === 0) {
                    container.innerHTML = "<p>No items found yet.</p>";
                    return;
                }

                container.innerHTML = allItems.map(item => `
                    <div class="item-card" onclick="openModal('${item._id || item.id}')">
                        <div class="item-img" style="background-image: url('${item.photo || ''}')"></div>
                        <div class="item-info">
                            <small style="color:var(--accent)">${item.type}</small>
                            <h3>${item.name}</h3>
                            <p style="font-size:0.8rem; color:var(--text-dim)">📍 ${item.location}</p>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                if(status) status.innerText = "Server is starting up (Render free tier)... please wait 30 seconds and refresh.";
            }
        }

        function openModal(id) {
            const item = allItems.find(i => (i._id === id || i.id === id));
            if(!item) return;

            document.getElementById('modalBody').innerHTML = `
                ${item.photo ? `<img src="${item.photo}" style="width:100%; border-radius:15px; margin-bottom:1rem; max-height:250px; object-fit:cover;">` : ''}
                <h2 style="color:var(--accent)">${item.name}</h2>
                <div style="background:rgba(255,255,255,0.03); padding:1rem; border-radius:12px; margin:1rem 0;">
                    <p>📍 Location: <b>${item.location}</b></p>
                    <p>📞 Phone: <a href="tel:${item.contact_phone}" style="color:var(--accent);">${item.contact_phone}</a></p>
                    <p>👤 Reported by: ${item.contact_name || 'User'}</p>
                </div>
                <button class="btn-main" onclick="closeModal()">Close</button>
            `;
            document.getElementById('itemModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('itemModal').style.display = 'none'; }

        // --- AUTH SUBMIT ---
        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                email: document.getElementById('authEmail').value,
                password: document.getElementById('authPass').value,
                name: document.getElementById('regName').value
            };
            const path = isLogin ? '/login' : '/register';
            try {
                const res = await fetch(API_URL + path, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if(res.ok) {
                    if(isLogin) { localStorage.setItem('user', JSON.stringify(data)); location.reload(); }
                    else { alert("Success! Now Login."); toggleAuth(); }
                } else { alert(data.error); }
            } catch (err) { alert("Server Error"); }
        };

        // --- REPORT SUBMIT ---
        document.getElementById('reportForm').onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData();
            fd.append('name', document.getElementById('rName').value);
            fd.append('location', document.getElementById('rLoc').value);
            fd.append('contact_phone', document.getElementById('rPhone').value);
            fd.append('type', document.getElementById('rType').value);
            fd.append('contact_name', currentUser.userName);

            const file = document.getElementById('rPhoto').files[0];
            if(file) fd.append('photo', file);

            try {
                const res = await fetch(`${API_URL}/items`, {
                    method: 'POST',
                    headers: { 'Authorization': currentUser.token }, // REQUIRED
                    body: fd
                });
                if(res.ok) { alert("Posted!"); showSection('browse'); }
                else { alert("Error: Try logging in again."); }
            } catch (err) { alert("Upload failed."); }
        };

        function updateAuthUI() {
            if(currentUser) {
                document.getElementById('userGreet').innerText = `HI, ${currentUser.userName.toUpperCase()}`;
                const ab = document.getElementById('authBtn');
                ab.innerText = "Logout";
                ab.onclick = () => { localStorage.removeItem('user'); location.reload(); };
            }
        }
    </script>
</body>
</html>
