<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LostFind - Premium Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700;800&display=swap');

        :root {
            --primary: #1a1a1e;
            --accent: #e91e63;
            --accent-light: #ff4081;
            --text-light: #f5f5f5;
            --text-muted: #b0b0b0;
            --border: rgba(255, 255, 255, 0.1);
            --glow: 0 0 20px rgba(233, 30, 99, 0.4);
            --success: #00d4aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0f1419;
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            background: rgba(26, 26, 30, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        nav { display: flex; gap: 1rem; align-items: center; }

        .nav-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-btn:hover { border-color: var(--accent); }
        .nav-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: var(--glow);
        }

        .nav-user { color: var(--accent); font-weight: bold; margin-right: 10px; font-size: 0.9rem; }

        /* --- SECTIONS --- */
        section { display: none; padding: 4rem 5%; min-height: 100vh; }
        section.active { display: block; animation: fadeIn 0.5s ease; }

        .hero { height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin-bottom: 1rem; }

        .form-container, .auth-box {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255,255,255,0.03);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input, select, textarea {
            width: 100%;
            padding: 0.8rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-family: inherit;
        }

        /* --- GRID --- */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .item-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid var(--border);
        }
        .item-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .item-image { height: 200px; background-size: cover; background-position: center; }
        .item-content { padding: 1.5rem; }

        /* --- MODAL --- */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.9); 
            z-index: 9999; justify-content: center; align-items: center; 
            backdrop-filter: blur(8px); padding: 20px;
        }
        .modal-content { 
            background: #1a1a1e; padding: 2rem; border-radius: 20px; 
            max-width: 550px; width: 100%; position: relative; 
            border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; 
        }

        .btn { padding: 0.8rem 1.5rem; border-radius: 50px; font-weight: 700; cursor: pointer; border: none; transition: 0.3s; display: inline-block; text-align: center; width: 100%; }
        .btn-primary { background: var(--accent); color: white; box-shadow: var(--glow); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="logo" onclick="showSection('hero')">LostFind</div>
            <nav>
                <span id="userNameDisplay" class="nav-user"></span>
                <button class="nav-btn" onclick="showSection('hero')">Home</button>
                <button class="nav-btn" onclick="showSection('browse')">Browse</button>
                <button class="nav-btn" onclick="handleReportClick()">Report Item</button>
                <button class="nav-btn" id="authNavBtn" onclick="showSection('auth')">Login</button>
            </nav>
        </div>
    </header>

    <section id="hero" class="active">
        <div class="hero">
            <h1>Find What You've Lost</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem; max-width: 600px;">A secure community portal dedicated to reuniting people with their belongings.</p>
            <div style="display: flex; gap: 1rem; width: 320px;">
                <button class="btn btn-primary" onclick="showSection('browse')">Start Browsing</button>
            </div>
        </div>
    </section>

    <section id="auth">
        <div class="auth-box">
            <h2 id="authTitle" style="margin-bottom: 1.5rem; font-family: 'Playfair Display';">Login</h2>
            <form id="authForm">
                <div class="form-group" id="nameGroup" style="display:none;">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="authEmail" required placeholder="name@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="authPass" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary">Continue</button>
                <p onclick="toggleAuthMode()" style="text-align:center; margin-top:1.5rem; cursor:pointer; color:var(--accent-light); font-size: 0.9rem;">
                    Don't have an account? Sign Up
                </p>
            </form>
        </div>
    </section>

    <section id="report">
        <div class="form-container">
            <h2 style="margin-bottom: 1.5rem; font-family: 'Playfair Display';">Report Lost Item</h2>
            <form id="reportForm">
                <div class="form-group">
                    <label>Item Name</label>
                    <input type="text" id="itemName" placeholder="e.g. iPhone 13 Pro" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="itemType">
                        <option value="Electronics">Electronics</option>
                        <option value="Personal">Personal/Keys</option>
                        <option value="Pets">Pets</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="itemDescription" placeholder="Color, distinguishing marks, etc." rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Location Found</label>
                    <input type="text" id="itemLocation" placeholder="e.g. Central Library" required>
                </div>
                <div class="form-group">
                    <label>Contact Phone</label>
                    <input type="tel" id="contactPhone" placeholder="Your mobile number" required>
                </div>
                <div class="form-group">
                    <label>Item Photo</label>
                    <input type="file" id="photoInput" accept="image/*">
                </div>
                <button type="submit" class="btn btn-primary">Submit Report</button>
            </form>
        </div>
    </section>

    <section id="browse">
        <h2 style="text-align: center; margin-bottom: 2.5rem; font-family: 'Playfair Display'; font-size: 2.5rem;">Recent Reports</h2>
        <div id="itemsContainer" class="items-grid"></div>
    </section>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span onclick="closeModal()" style="position:absolute; right:20px; top:15px; cursor:pointer; font-size:1.5rem;">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // --- API CONFIGURATION ---
        const API_URL = 'https://lostfoundweb.onrender.com/api';

        let currentUser = JSON.parse(localStorage.getItem('user')) || null;
        let isLoginMode = true;

        // NEW: Initial Connection Check
        window.onload = () => {
            updateUI();
            loadItems(); // Automatically load items when page opens
            console.log("Connecting to backend at:", API_URL);
        };

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
            if(id === 'browse') loadItems();
        }

        function handleReportClick() {
            if (!currentUser) { alert("Please login to report an item."); showSection('auth'); }
            else { showSection('report'); }
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? "Login" : "Sign Up";
            document.getElementById('nameGroup').style.display = isLoginMode ? "none" : "block";
        }

        function updateUI() {
            const authNavBtn = document.getElementById('authNavBtn');
            const userDisplay = document.getElementById('userNameDisplay');
            if (currentUser) {
                authNavBtn.innerText = "Logout";
                authNavBtn.onclick = logout;
                userDisplay.innerText = `Hi, ${currentUser.userName}`;
            } else {
                authNavBtn.innerText = "Login";
                authNavBtn.onclick = () => showSection('auth');
                userDisplay.innerText = "";
            }
        }

        function logout() { localStorage.removeItem('user'); location.reload(); }

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPass').value;
            const name = document.getElementById('regName').value;

            try {
                const res = await fetch(API_URL + (isLoginMode ? '/login' : '/register'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, name })
                });
                const data = await res.json();
                if (res.ok) {
                    if(isLoginMode) {
                        localStorage.setItem('user', JSON.stringify(data));
                        location.reload();
                    } else { alert("Sign up successful!"); toggleAuthMode(); }
                } else { alert(data.error); }
            } catch (err) { alert("Connection Error. Is your Render server awake?"); }
        };

        document.getElementById('reportForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('itemName').value);
            formData.append('type', document.getElementById('itemType').value);
            formData.append('description', document.getElementById('itemDescription').value);
            formData.append('location', document.getElementById('itemLocation').value);
            formData.append('contact_phone', document.getElementById('contactPhone').value);
            formData.append('contact_name', currentUser.userName);
            const photo = document.getElementById('photoInput').files[0];
            if(photo) formData.append('photo', photo);

            try {
                const res = await fetch(`${API_URL}/items`, {
                    method: 'POST',
                    headers: { 'Authorization': currentUser.token },
                    body: formData
                });
                if(res.ok) { alert("Item Reported!"); document.getElementById('reportForm').reset(); showSection('browse'); }
                else { alert("Failed to report item."); }
            } catch (err) { alert("Network error during report."); }
        };

        async function loadItems() {
            try {
                const res = await fetch(`${API_URL}/items`);
                const items = await res.json();
                const container = document.getElementById('itemsContainer');
                
                if (items.length === 0) {
                    container.innerHTML = `<p style="text-align:center; width:100%; color:var(--text-muted);">No items reported yet.</p>`;
                    return;
                }

                container.innerHTML = items.map(item => `
                    <div class="item-card" onclick="openModal('${item.id || item._id}')">
                        <div class="item-image" style="background-image: url('${item.photo || ''}'); background-color:#222;"></div>
                        <div class="item-content">
                            <small style="color:var(--accent)">${item.type}</small>
                            <h3>${item.name}</h3>
                            <p style="font-size:0.8rem; color:var(--text-muted)">📍 ${item.location}</p>
                        </div>
                    </div>
                `).join('');
            } catch (err) { console.error("Browse failed."); }
        }

        async function openModal(id) {
            try {
                const res = await fetch(`${API_URL}/items`);
                const items = await res.json();
                const item = items.find(i => (i.id || i._id) === id);
                if(!item) return;

                const isOwner = currentUser && item.userId === currentUser.userId;

                document.getElementById('modalBody').innerHTML = `
                    ${item.photo ? `<img src="${item.photo}" style="width:100%; border-radius:15px; margin-bottom:1rem; border:1px solid #333;">` : ''}
                    <h2 style="font-family:'Playfair Display'">${item.name}</h2>
                    <p style="margin:1rem 0">${item.description || 'No description provided.'}</p>
                    <div style="background:rgba(255,255,255,0.05); padding:1rem; border-radius:10px;">
                        <p>📍 Location: <b>${item.location}</b></p>
                        <p>📞 Phone: <b>${item.contact_phone}</b></p>
                        <p>👤 Reported by: <b>${item.contact_name}</b></p>
                    </div>
                    ${isOwner ? `<button class="btn btn-primary" style="margin-top:1rem; background:var(--success);" onclick="markAsClaimed('${item.id || item._id}')">Mark as Claimed</button>` : ''}
                `;
                document.getElementById('detailModal').style.display = 'flex';
            } catch (err) { alert("Error opening item details."); }
        }

        function closeModal() { document.getElementById('detailModal').style.display = 'none'; }

        async function markAsClaimed(id) {
            if(!confirm("Remove this report permanently?")) return;
            try {
                const res = await fetch(`${API_URL}/items/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': currentUser.token }
                });
                if(res.ok) { closeModal(); loadItems(); alert("Report removed!"); }
                else { alert("Unauthorized."); }
            } catch (err) { alert("Error deleting report."); }
        }
    </script>
</body>
</html>
