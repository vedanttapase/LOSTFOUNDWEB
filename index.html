<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LostFind - Premium Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700;800&display=swap');

        :root {
            --primary: #1a1a1e;
            --accent: #e91e63;
            --accent-light: #ff4081;
            --text-light: #f5f5f5;
            --text-muted: #b0b0b0;
            --border: rgba(255, 255, 255, 0.1);
            --glow: 0 0 20px rgba(233, 30, 99, 0.4);
            --success: #00d4aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0f1419;
            color: var(--text-light);
            line-height: 1.6;
        }

        /* --- HEADER --- */
        header {
            background: rgba(26, 26, 30, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        nav { display: flex; gap: 1rem; align-items: center; }

        .nav-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-btn:hover { border-color: var(--accent); }
        .nav-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: var(--glow);
        }

        .nav-user { color: var(--accent); font-weight: bold; margin-right: 10px; font-size: 0.9rem; }

        /* --- SECTIONS --- */
        section { display: none; padding: 4rem 5%; min-height: 100vh; }
        section.active { display: block; animation: fadeIn 0.5s ease; }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .item-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid var(--border);
        }
        .item-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .item-image { height: 200px; background-size: cover; background-position: center; }
        .item-content { padding: 1.5rem; }

        /* --- MODAL (THE FIX) --- */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 9999; 
            justify-content: center; 
            align-items: center; 
            backdrop-filter: blur(8px); 
            padding: 20px;
        }
        .modal-content { 
            background: #1a1a1e; 
            padding: 2.5rem; 
            border-radius: 20px; 
            max-width: 550px; 
            width: 100%; 
            position: relative; 
            border: 1px solid var(--border); 
            max-height: 90vh; 
            overflow-y: auto; 
        }

        .btn { padding: 0.8rem 1.5rem; border-radius: 50px; font-weight: 700; cursor: pointer; border: none; transition: 0.3s; width: 100%; margin-top: 1rem; }
        .btn-primary { background: var(--accent); color: white; box-shadow: var(--glow); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="logo" onclick="showSection('hero')">LostFind</div>
            <nav>
                <span id="userNameDisplay" class="nav-user"></span>
                <button class="nav-btn active" onclick="showSection('hero')">Home</button>
                <button class="nav-btn" onclick="showSection('browse')">Browse</button>
                <button class="nav-btn" onclick="handleReportClick()">Report Item</button>
                <button class="nav-btn" id="authNavBtn" onclick="showSection('auth')">Login</button>
            </nav>
        </div>
    </header>

    <section id="hero" class="active">
        <div style="text-align: center; margin-top: 10vh;">
            <h1 style="font-family: 'Playfair Display'; font-size: 3.5rem;">Find What You've Lost</h1>
            <p style="color: var(--text-muted); margin: 2rem auto; max-width: 600px;">A secure community portal to reunite you with your belongings.</p>
            <button class="btn btn-primary" style="width: 250px;" onclick="showSection('browse')">Start Browsing</button>
        </div>
    </section>

    <section id="browse">
        <h2 style="text-align: center; margin-bottom: 2.5rem; font-family: 'Playfair Display'; font-size: 2.5rem;">Recent Reports</h2>
        <div id="itemsContainer" class="items-grid"></div>
    </section>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span onclick="closeModal()" style="position:absolute; right:20px; top:15px; cursor:pointer; font-size:2rem; color:var(--accent);">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://lostfoundweb.onrender.com/api';
        let currentUser = JSON.parse(localStorage.getItem('user')) || null;
        let allItems = []; // Global storage for items

        window.onload = () => {
            updateUI();
            loadItems();
        };

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'browse') loadItems();
        }

        async function loadItems() {
            try {
                const res = await fetch(`${API_URL}/items`);
                allItems = await res.json();
                const container = document.getElementById('itemsContainer');
                
                container.innerHTML = allItems.map(item => `
                    <div class="item-card" onclick="openModal('${item._id || item.id}')">
                        <div class="item-image" style="background-image: url('${item.photo || ''}'); background-color:#222;"></div>
                        <div class="item-content">
                            <small style="color:var(--accent)">${item.type}</small>
                            <h3>${item.name}</h3>
                            <p style="font-size:0.8rem; color:var(--text-muted)">📍 ${item.location}</p>
                        </div>
                    </div>
                `).join('');
            } catch (err) { console.error("Load failed"); }
        }

        function openModal(id) {
            const item = allItems.find(i => (i._id === id || i.id === id));
            if(!item) return;

            document.getElementById('modalBody').innerHTML = `
                ${item.photo ? `<img src="${item.photo}" style="width:100%; border-radius:15px; margin-bottom:1.5rem;">` : ''}
                <h2 style="font-family:'Playfair Display'; color:var(--accent)">${item.name}</h2>
                <p style="margin:1rem 0; color:var(--text-muted)">${item.description || 'No description provided.'}</p>
                <div style="background:rgba(255,255,255,0.05); padding:1rem; border-radius:10px; border-left: 4px solid var(--accent);">
                    <p>📍 Location: <b>${item.location}</b></p>
                    <p>📞 Phone: <b>${item.contact_phone}</b></p>
                    <p>👤 Reported by: <b>${item.contact_name}</b></p>
                </div>
                <button class="btn btn-primary" onclick="closeModal()">Close Details</button>
            `;
            
            const modal = document.getElementById('detailModal');
            modal.style.display = 'flex'; // Triggering the pop-up
        }

        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        function updateUI() {
            const userDisplay = document.getElementById('userNameDisplay');
            if (currentUser) userDisplay.innerText = `Hi, ${currentUser.userName}`;
        }

        // Add back your auth login/register/report logic here
    </script>
</body>
</html>
