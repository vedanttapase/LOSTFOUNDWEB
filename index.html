<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE AI | CAMPUS FINDERS</title>
    <style>
        :root {
            --neon-red: #ff0000;
            --maroon: #800000;
            --bg-black: #050505;
            --terminal-green: #00ff41;
            --border-glow: 0 0 15px rgba(128, 0, 0, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- HEADER --- */
        header {
            width: 100%;
            padding: 30px;
            text-align: center;
            border-bottom: 2px solid var(--maroon);
            box-shadow: 0 0 20px var(--maroon);
            margin-bottom: 40px;
            background: rgba(10, 0, 0, 0.9);
        }

        h1 { font-size: 2rem; letter-spacing: 3px; }

        /* --- GRID --- */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1200px;
            padding-bottom: 50px;
        }

        .item-card {
            background: #111;
            border: 1px solid var(--maroon);
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .item-card:hover {
            border-color: var(--neon-red);
            box-shadow: 0 0 20px var(--maroon);
            transform: translateY(-5px);
        }

        .item-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border: 1px solid #222;
            margin-bottom: 15px;
        }

        .item-card h3 { margin-bottom: 10px; color: var(--neon-red); }

        /* --- THE MODAL (POP-UP) --- */
        .modal {
            display: none; /* Hidden by default */
            position: fixed;
            z-index: 10000; /* Ensure it stays on top */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #000;
            padding: 25px;
            border: 2px solid var(--neon-red);
            width: 90%;
            max-width: 500px;
            box-shadow: 0 0 30px var(--maroon);
            position: relative;
            animation: flicker 0.15s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 0.97; }
            100% { opacity: 1; }
        }

        .close-btn {
            color: var(--neon-red);
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
        }

        .close-btn:hover { color: white; }

        .modal-btn {
            background: var(--maroon);
            color: white;
            border: 1px solid var(--neon-red);
            padding: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-family: inherit;
            font-weight: bold;
            transition: 0.3s;
        }

        .modal-btn:hover {
            background: var(--neon-red);
            color: black;
        }

        footer {
            margin-top: auto;
            padding: 30px;
            font-size: 0.8rem;
            color: #555;
            text-align: center;
            width: 100%;
            border-top: 1px solid #111;
        }
    </style>
</head>
<body>

<header>
    <h1>SYSTEM ACCESS: CAMPUS FINDERS</h1>
    <p style="color: var(--terminal-green); font-size: 0.9rem;">[ STATUS: ENCRYPTED_CONNECTION_ACTIVE ]</p>
</header>

<div class="container">
    <div class="item-card" onclick="openItem('Lost Wallet', 'Found near the library. Contains Student ID and cash. Verify name to claim.', 'main.jpg')">
        <img src="main.jpg" alt="Lost Item">
        <h3>LOST ITEM #001</h3>
        <p style="font-size: 0.8rem; color: #888;">SCAN FOR DATA</p>
    </div>

    </div>

<div id="itemWindow" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeItem()">&times;</span>
        <h2 id="modalTitle" style="color: var(--neon-red); margin-bottom: 10px;">ITEM_DETAILS</h2>
        <hr style="border: 0.5px solid var(--maroon); margin-bottom: 15px;">
        
        <img id="modalImg" src="" style="width:100%; border: 1px solid #333;">
        
        <p id="modalDesc" style="margin-top: 20px; line-height: 1.6; font-size: 0.9rem; color: #ccc;"></p>
        
        <button class="modal-btn" onclick="closeItem()">RETURN TO DASHBOARD</button>
    </div>
</div>

<footer>
    MADE BY RUSHIKESH DHERE | PROJECT B | 2026
</footer>

<script>
    const modal = document.getElementById("itemWindow");
    const modalTitle = document.getElementById("modalTitle");
    const modalDesc = document.getElementById("modalDesc");
    const modalImg = document.getElementById("modalImg");

    /**
     * Function to open the modal with dynamic content
     */
    function openItem(name, desc, imgSource) {
        modalTitle.innerText = "DATA_ID: " + name.toUpperCase();
        modalDesc.innerText = "LOG_ENTRY: " + desc;
        modalImg.src = imgSource;
        
        // Show the modal using flex to center content
        modal.style.display = "flex";
    }

    /**
     * Function to hide the modal
     */
    function closeItem() {
        modal.style.display = "none";
    }

    /**
     * Close modal if the user clicks the darkened background
     */
    window.onclick = function(event) {
        if (event.target == modal) {
            closeItem();
        }
    }
</script>

</body>
</html>
