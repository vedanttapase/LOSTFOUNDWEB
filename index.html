<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LostFind - Premium Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700;800&display=swap');

        :root {
            --primary: #1a1a1e;
            --accent: #e91e63;
            --accent-light: #ff4081;
            --text-light: #f5f5f5;
            --text-muted: #b0b0b0;
            --border: rgba(255, 255, 255, 0.1);
            --glow: 0 0 20px rgba(233, 30, 99, 0.4);
            --success: #00d4aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0f1419;
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            background: rgba(26, 26, 30, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        nav { display: flex; gap: 1rem; align-items: center; }

        .nav-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-btn:hover { border-color: var(--accent); }
        .nav-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: var(--glow);
        }

        .nav-user { color: var(--accent); font-weight: bold; margin-right: 10px; font-size: 0.9rem; }

        section { display: none; padding: 4rem 5%; min-height: 100vh; }
        section.active { display: block; animation: fadeIn 0.5s ease; }

        .hero { height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin-bottom: 1rem; }

        .form-container, .auth-box {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255,255,255,0.03);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input, select, textarea {
            width: 100%;
            padding: 0.8rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-family: inherit;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .item-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid var(--border);
        }
        .item-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .item-image { height: 200px; background-size: cover; background-position: center; border-bottom: 1px solid var(--border); }
        .item-content { padding: 1.5rem; }

        .modal { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.9); 
            z-index: 9999; justify-content: center; align-items: center; 
            backdrop-filter: blur(8px); padding: 20px;
        }
        .modal-content { 
            background: #1a1a1e; padding: 2.5rem; border-radius: 20px; 
            max-width: 550px; width: 100%; position: relative; 
            border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; 
        }

        .btn { padding: 0.8rem 1.5rem; border-radius: 50px; font-weight: 700; cursor: pointer; border: none; transition: 0.3s; display: inline-block; text-align: center; width: 100%; }
        .btn-primary { background: var(--accent); color: white; box-shadow: var(--glow); }
        .btn-success { background: var(--success); color: #000; margin-top: 1rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="logo" onclick="showSection('hero')">LostFind</div>
            <nav>
                <span id="userNameDisplay" class="nav-user"></span>
                <button class="nav-btn" onclick="showSection('hero')">Home</button>
                <button class="nav-btn" onclick="showSection('browse')">Browse</button>
                <button class="nav-btn" onclick="handleReportClick()">Report Item</button>
                <button class="nav-btn" id="authNavBtn" onclick="showSection('auth')">Login</button>
            </nav>
        </div>
    </header>

    <section id="hero" class="active">
        <div class="hero">
            <h1>Find What You've Lost</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem; max-width: 600px;">A secure community portal dedicated to reuniting people with their belongings.</p>
            <button class="btn btn-primary" style="width: 250px;" onclick="showSection('browse')">Start Browsing</button>
        </div>
    </section>

    <section id="auth">
        <div class="auth-box">
            <h2 id="authTitle" style="margin-bottom: 1.5rem; font-family: 'Playfair Display';">Login</h2>
            <form id="authForm">
                <div class="form-group" id="nameGroup" style="display:none;">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="authEmail" required placeholder="name@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="authPass" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary">Continue</button>
                <p onclick="toggleAuthMode()" style="text-align:center; margin-top:1.5rem; cursor:pointer; color:var(--accent-light); font-size: 0.9rem;">
                    Don't have an account? Sign Up
                </p>
            </form>
        </div>
    </section>

    <section id="report">
        <div class="form-container">
            <h2 style="margin-bottom: 1.5rem; font-family: 'Playfair Display';">Report Lost Item</h2>
            <form id="reportForm">
                <div class="form-group"><label>Item Name</label><input type="text" id="itemName" required></div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="itemType">
                        <option value="Electronics">Electronics</option>
                        <option value="Personal">Personal/Keys</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group"><label>Description</label><textarea id="itemDescription" rows="3"></textarea></div>
                <div class="form-group"><label>Location Found</label><input type="text" id="itemLocation" required></div>
                <div class="form-group"><label>Contact Phone</label><input type="tel" id="contactPhone" required></div>
                <div class="form-group"><label>Item Photo</label><input type="file" id="photoInput" accept="image/*"></div>
                <button type="submit" class="btn btn-primary">Submit Report</button>
            </form>
        </div>
    </section>

    <section id="browse">
        <h2 style="text-align: center; margin-bottom: 2.5rem; font-family: 'Playfair Display'; font-size: 2.5rem;">Recent Reports</h2>
        <div id="itemsContainer" class="items-grid"></div>
    </section>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span onclick="closeModal()" style="position:absolute; right:20px; top:15px; cursor:pointer; font-size:1.5rem;">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://lostfoundweb.onrender.com/api";
        let currentUser = JSON.parse(localStorage.getItem('user')) || null;
        let isLoginMode = true;

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
            if(id === 'browse') loadItems();
        }

        function handleReportClick() {
            if (!currentUser) { alert("Please login to report an item."); showSection('auth'); }
            else { showSection('report'); }
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? "Login" : "Sign Up";
            document.getElementById('nameGroup').style.display = isLoginMode ? "none" : "block";
        }

        function updateUI() {
            const authNavBtn = document.getElementById('authNavBtn');
            const userDisplay = document.getElementById('userNameDisplay');
            if (currentUser) {
                authNavBtn.innerText = "Logout";
                authNavBtn.onclick = () => { localStorage.removeItem('user'); location.reload(); };
                userDisplay.innerText = `Hi, ${currentUser.userName}`;
            }
        }

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPass').value;
            const name = document.getElementById('regName').value;
            const endpoint = isLoginMode ? '/login' : '/register';

            try {
                const res = await fetch(API_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, name })
                });
                const data = await res.json();
                if (res.ok) {
                    if(isLoginMode) { localStorage.setItem('user', JSON.stringify(data)); location.reload(); }
                    else { alert("Sign up successful! Please login."); toggleAuthMode(); }
                } else { alert(data.error); }
            } catch (err) { alert("Error connecting to server."); }
        };

        async function loadItems() {
            try {
                const res = await fetch(`${API_URL}/items`);
                const items = await res.json();
                document.getElementById('itemsContainer').innerHTML = items.map(item => {
                    // FIX: Ensure image uses HTTPS
                    let photoSrc = item.photo;
                    if (photoSrc && photoSrc.startsWith('http://')) {
                        photoSrc = photoSrc.replace('http://', 'https://');
                    }
                    const finalImg = photoSrc || 'https://via.placeholder.com/300x200?text=No+Image';
                    
                    return `
                        <div class="item-card" onclick="openModal(${item.id})">
                            <div class="item-image" style="background-image: url('${finalImg}');"></div>
                            <div class="item-content">
                                <small style="color:var(--accent)">${item.type}</small>
                                <h3 style="margin: 5px 0;">${item.name}</h3>
                                <p style="font-size:0.85rem; color:var(--text-muted)">📍 ${item.location}</p>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) { console.error("Error loading items."); }
        }

        async function openModal(id) {
            try {
                const res = await fetch(`${API_URL}/items`);
                const items = await res.json();
                const item = items.find(i => i.id == id);
                if(!item) return;

                let photoSrc = item.photo;
                if (photoSrc && photoSrc.startsWith('http://')) {
                    photoSrc = photoSrc.replace('http://', 'https://');
                }
                const finalImg = photoSrc || 'https://via.placeholder.com/500x300?text=No+Image+Available';

                const isOwner = currentUser && item.userId == currentUser.userId;

                document.getElementById('modalBody').innerHTML = `
                    <img src="${finalImg}" style="width:100%; border-radius:15px; margin-bottom:1.5rem; border: 1px solid var(--border);">
                    <h2 style="font-family:'Playfair Display'; font-size:2rem; margin-bottom:0.5rem;">${item.name}</h2>
                    <p style="color:var(--text-muted); margin-bottom:1.5rem;">${item.description || 'No description provided.'}</p>
                    
                    <div style="background:rgba(255,255,255,0.03); padding:1.2rem; border-radius:12px; border:1px solid var(--border);">
                        <p style="margin-bottom:8px;">📍 <b>Location:</b> ${item.location}</p>
                        <p style="margin-bottom:8px;">📞 <b>Contact:</b> ${item.contact_phone}</p>
                        <p>👤 <b>Reported by:</b> ${item.contact_name}</p>
                    </div>
                    ${isOwner ? `<button onclick="deleteItem(${item.id})" class="btn btn-success">Item Found</button>` : ''}
                `;
                document.getElementById('detailModal').style.display = 'flex';
            } catch (err) { alert("Could not open item details."); }
        }

        async function deleteItem(id) {
            if(!confirm("Mark this item as found? It will be removed from the list.")) return;
            try {
                const res = await fetch(`${API_URL}/items/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': currentUser.token }
                });
                if(res.ok) {
                    alert("Status Updated: Item marked as Found.");
                    closeModal();
                    loadItems();
                } else {
                    alert("Action failed.");
                }
            } catch (err) {
                alert("Error updating status.");
            }
        }

        function closeModal() { document.getElementById('detailModal').style.display = 'none'; }
        
        document.getElementById('reportForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('itemName').value);
            formData.append('type', document.getElementById('itemType').value);
            formData.append('description', document.getElementById('itemDescription').value);
            formData.append('location', document.getElementById('itemLocation').value);
            formData.append('contact_phone', document.getElementById('contactPhone').value);
            formData.append('contact_name', currentUser.userName);
            const photo = document.getElementById('photoInput').files[0];
            if(photo) formData.append('photo', photo);

            const res = await fetch(`${API_URL}/items`, {
                method: 'POST',
                headers: { 'Authorization': currentUser.token },
                body: formData
            });
            if(res.ok) { alert("Reported successfully!"); showSection('browse'); }
            else { alert("Failed to report item."); }
        };

        updateUI();
    </script>
</body>
</html>
